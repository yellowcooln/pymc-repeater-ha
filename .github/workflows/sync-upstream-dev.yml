name: Sync Upstream Dev

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: write

jobs:
  sync-upstream-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read current tracked upstream revision
        id: tracked
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import os
          state = json.loads(Path('.github/upstream-dev.json').read_text())
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f"revision={state['revision']}\n")
          PY

      - name: Pull upstream dev image
        run: docker pull pymcdev/pymc-repeater:dev

      - name: Read upstream image revision label
        id: upstream
        run: |
          revision="$(docker inspect pymcdev/pymc-repeater:dev --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          echo "revision=${revision}" >> "$GITHUB_OUTPUT"

      - name: Stop if upstream revision is unchanged
        if: steps.tracked.outputs.revision == steps.upstream.outputs.revision
        run: echo "Upstream revision unchanged; nothing to do."

      - name: Fetch upstream compare data
        if: steps.tracked.outputs.revision != steps.upstream.outputs.revision
        env:
          OLD_REVISION: ${{ steps.tracked.outputs.revision }}
          NEW_REVISION: ${{ steps.upstream.outputs.revision }}
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/pyMC-dev/pyMC_Repeater/compare/${OLD_REVISION}...${NEW_REVISION}" \
            -o /tmp/pymc-repeater-compare.json

      - name: Update tracked upstream revision and changelog
        if: steps.tracked.outputs.revision != steps.upstream.outputs.revision
        env:
          NEW_REVISION: ${{ steps.upstream.outputs.revision }}
          COMPARE_JSON_PATH: /tmp/pymc-repeater-compare.json
        run: python scripts/sync_upstream_dev.py

      - name: Commit and push changes
        if: steps.tracked.outputs.revision != steps.upstream.outputs.revision
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/upstream-dev.json pymc_repeater/config.yaml pymc_repeater/CHANGELOG.md
          git commit -m "Sync upstream pyMC Repeater dev"
          git push
