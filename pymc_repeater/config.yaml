name: "pyMC Repeater"
version: "0.1.0"
slug: "pymc_repeater"
description: "MeshCore pyMC Repeater daemon for Home Assistant"
url: "https://github.com/pyMC-dev/pyMC_Repeater"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
stage: experimental
webui: "http://[HOST]:[PORT:8000]/"
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "pyMC Repeater web UI"
map:
  - type: addon_config
    path: /config
    read_only: false
  - type: data
    path: /var/lib/pymc_repeater
    read_only: false
apparmor: false
full_access: true
init: true
options: {}
schema: {}
